name: Restrict merge source

on:
  pull_request:
      branches:
        - main

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch is staging
        run: |
          if [[ "${{ github.head_ref }}" != "staging" ]]; then
            echo "Only 'staging' can be merged into 'main'. Got ${{ github.head_ref }}"
            exit 1
          fi
