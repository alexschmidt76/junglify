<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Whole-monkey root: scale 1.3924x from original 74x79 art, shifted so feet land near y=128 -->
  <g id="monkey-root" transform="translate(12, 9) scale(1.3924)">

    <!-- ============ TAIL (behind body, animates as a slow idle curl/sway) ============ -->
    <!-- joint = base of tail where it meets the torso, approx (39.5, 54) in original coords -->
    <g id="tail" transform="translate(39.57, 54.08)">
      <path d="M0 0C-9.5 6 -17.24 -7.77 -19.02 -16.08C-20.52 -23.08 -23.52 -26.08 -29.52 -26.08C-34.52 -26.08 -37.62 -22.38 -38.02 -17.58C-38.77 -8.58 -31.46 -4.61 -26.52 -7.08C-22.52 -9.08 -24.02 -19.08 -29.52 -19.08C-37.02 -19.08 -33.02 -10.58 -30.52 -12.58"
            stroke="#744A32" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- ============ LEFT ARM (viewer's left / monkey's right) ============ -->
    <!-- joint = shoulder, where arm meets torso, approx (29, 40) -->
    <g id="arm-left" transform="translate(29.5, 40)">
      <path d="M-1.22 5.21C-2.72 9.71 -4.93 12.21 -6.72 12.21C-9.72 11.21 -6.9 2.71 -3.9 -0.29C-0.9 -2.29 3.6 -6.29 3.6 -2.29C3.6 1.71 1.27 2.71 -1.22 5.21Z"
            fill="#744A32"/>
    </g>

    <!-- ============ RIGHT ARM ============ -->
    <!-- joint = shoulder, mirrored, approx (64, 40) -->
    <g id="arm-right" transform="translate(64, 40)">
      <path d="M1.33 5.21C2.83 9.71 5.03 12.21 6.83 12.21C9.83 11.21 7 2.71 4 -0.29C1 -2.29 -3.5 -6.29 -3.5 -2.29C-3.5 1.71 -1.17 2.71 1.33 5.21Z"
            fill="#744A32"/>
    </g>

    <!-- ============ LEFT LEG (+ foot, as one rigid swing unit) ============ -->
    <!-- joint = hip, where leg meets torso underside, approx (34, 58) -->
    <g id="leg-left" transform="translate(34.16, 58)">
      <path d="M3 0C3 0 4.13 10.84 1.37 11.5C-1.38 12.16 -2.63 3.21 -2.63 3.21C-2.63 3.21 -1.84 -8 3 -8C7.84 -8 3 0 3 0Z"
            fill="#744A32"/>
      <path d="M-8.16 9.5C-8.16 10.88 -6.14 11.79 -3.66 12C3.09 12.56 1.85 11.56 1.85 9.5C1.85 7 -1.18 7 -3.66 7C-6.15 7 -8.16 8.12 -8.16 9.5Z"
            fill="#744A32"/>
    </g>

    <!-- ============ RIGHT LEG (+ foot) ============ -->
    <!-- joint = hip, mirrored, approx (59, 58) -->
    <g id="leg-right" transform="translate(59.16, 58)">
      <path d="M-2.5 0C-2.5 0 -1.37 10.84 1.38 11.5C4.13 12.16 5.38 3.21 5.38 3.21C5.38 3.21 4.59 -8 -0.25 -8C-5.09 -8 -2.5 0 -2.5 0Z"
            fill="#744A32"/>
      <path d="M8.35 9.5C8.35 10.88 6.32 11.79 3.84 12C-2.91 12.56 -1.67 11.56 -1.67 9.5C-1.67 7 1.36 7 3.84 7C6.33 7 8.35 8.12 8.35 9.5Z"
            fill="#744A32"/>
    </g>

    <!-- ============ TORSO (static body mass — head sits on top, limbs attach around it) ============ -->
    <g id="torso">
      <path d="M62.4969 43C62.4969 55.7025 59.4494 66 46.7517 66C34.054 66 30.4986 55.7025 30.4986 43C30.4986 30.2975 30.4986 20 46.7517 20C63.0048 20 62.4969 30.2975 62.4969 43Z"
            fill="#744A32"/>
      <ellipse cx="46.4986" cy="48" rx="10" ry="12" fill="#FFC9A8"/>
    </g>

    <!-- ============ HEAD (skull, ears, face — one rigid unit for idle head-tilt/look animations) ============ -->
    <!-- joint = base of neck/where head meets torso, approx (46.5, 32) -->
    <g id="head" transform="translate(46.5, 32)">
      <g transform="translate(-46.5, -32)">
        <ellipse cx="46.4986" cy="18" rx="22" ry="18" fill="#744A32"/>

        <!-- ears (outer then inner, each side) -->
        <circle cx="67.4986" cy="16" r="6" fill="#744A32"/>
        <circle cx="25.4986" cy="16" r="6" fill="#744A32"/>
        <path d="M26.206 16.1512C25.7894 20.3664 24.706 20.263 23.3523 20.1512C21.9986 20.0394 20.4986 18.3603 20.4986 16.1512C20.4986 13.942 21.3523 12.5725 23.3523 12.1512C25.3523 11.7298 26.6225 11.9359 26.206 16.1512Z"
              fill="#FFC9A8"/>
        <path d="M66.5777 16.1512C66.9943 20.3664 68.0777 20.263 69.4314 20.1512C70.785 20.0394 72.285 18.3603 72.285 16.1512C72.285 13.942 71.4314 12.5725 69.4314 12.1512C67.4314 11.7298 66.1611 11.9359 66.5777 16.1512Z"
              fill="#FFC9A8"/>

        <!-- muzzle backing -->
        <ellipse cx="46.4986" cy="26" rx="12" ry="6" fill="#FFC9A8"/>

        <!-- cheek patches (deduped — original had this path twice) -->
        <path d="M40.4986 23C44.9169 23 48.4986 19.4183 48.4986 15C48.4986 10.5817 44.9169 7 40.4986 7C36.0804 7 32.4986 10.5817 32.4986 15C32.4986 19.4183 36.0804 23 40.4986 23Z"
              fill="#FFC9A8"/>
        <circle cx="52.4986" cy="15" r="8" fill="#FFC9A8"/>

        <!-- eyes -->
        <path d="M45.4986 15C45.4986 17.7614 43.2601 20 40.4986 20C37.7372 20 35.4986 17.7614 35.4986 15C35.4986 12.2386 37.7372 10 40.4986 10C43.2601 10 45.4986 12.2386 45.4986 15Z"
              fill="white"/>
        <circle cx="52.4986" cy="15" r="5" fill="#FFF8F8"/>
        <circle cx="40.4986" cy="15" r="2" fill="black"/>
        <circle cx="52.4986" cy="15" r="2" fill="black"/>

        <!-- nose dot marks -->
        <path d="M45.7946 20.8571C46.2537 22 45.7946 22.5 45.7946 22.5C45.2874 22.5 43.4986 21.3571 43.4986 20.8571C43.4987 20.4286 44.369 20 44.8762 20C45.3834 20 45.5675 20.2919 45.7946 20.8571Z"
              fill="black"/>
        <path d="M47.2027 22.5C47.2027 22.5 46.7435 22 47.2027 20.8571C47.4298 20.2919 47.6139 20 48.1211 20C48.6283 20 49.4986 20.4286 49.4986 20.8571C49.4986 21.3571 47.7099 22.5 47.2027 22.5Z"
              fill="black"/>

        <!-- mouth -->
        <path d="M55.4986 25.3901C55.4986 27.047 50.9169 29.8901 46.4986 29.8901C42.0804 29.8901 37.4986 27.047 37.4986 25.3901C37.4986 23.7333 42.0804 27.8901 46.4986 27.8901C50.9169 27.8901 55.4986 23.7333 55.4986 25.3901Z"
              fill="black"/>
      </g>
    </g>

  </g>
</svg>